<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dropship</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#FA7207">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Dropship">
    <link rel="apple-touch-icon" href="../icons/icon-192.png">
    <style>
        body { background: var(--white); }
        .auth-page { min-height: calc(100vh - 56px); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-header { background: var(--primary); padding: 20px; text-align: center; color: var(--white); width: 100%; max-width: 400px; border-radius: 12px 12px 0 0; }
        .auth-form { width: 100%; max-width: 400px; padding: 25px 20px; background: var(--white); border: 1px solid var(--border); border-top: none; border-radius: 0 0 12px 12px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 14px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 1rem; background: var(--white); }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .forgot-link { text-align: right; margin-bottom: 20px; }
        .forgot-link a { color: var(--primary); font-size: 0.9rem; }
        .auth-btn { width: 100%; padding: 14px; background: var(--primary); color: var(--white); border: none; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .auth-btn:disabled { background: #ffaa70; cursor: not-allowed; }
        .auth-link { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .auth-link a { color: var(--primary); font-weight: 600; }
        .error-msg { background: #ffebee; color: #c62828; padding: 12px; border-radius: 4px; margin-bottom: 15px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <a href="/html/index.html" class="back-btn" style="color: white; font-size: 1.2rem;">
                <i class="fas fa-arrow-left"></i>
            </a>
            <a href="/html/index.html" class="logo">
                <i class="fas fa-shopping-bag logo-icon"></i>
                <span>Dropship</span>
            </a>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Sign in to continue shopping</p>
        </div>
        <div class="auth-form">
            <div id="errorMsg" class="error-msg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="forgot-link"><a href="#">Forgot Password?</a></div>
                <button type="submit" class="auth-btn" id="loginBtn">SIGN IN</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="/html/signup.html">Create Account</a></p>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script>
        if (Auth.isLoggedIn()) window.location.href = '/html/account.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');

            errorMsg.style.display = 'none';
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                await Auth.login(email, password);
                const backup = sessionStorage.getItem('cart_backup');
                if (backup) { localStorage.setItem('cart', backup); sessionStorage.removeItem('cart_backup'); }

                const localCart = JSON.parse(localStorage.getItem('cart')) || [];
                if (localCart.length > 0) {
                    let migrated = 0;
                    for (const item of localCart) {
                        try { await Cart.addItem(String(item.id || item.product_id), item.quantity || 1); migrated++; } catch (err) {}
                    }
                    if (migrated > 0) {
                        localStorage.removeItem('cart');
                        try { const fresh = await Cart.get(); sessionStorage.setItem('apiCart', JSON.stringify(fresh)); } catch (_) {}
                    }
                }

                const redirect = new URLSearchParams(window.location.search).get('redirect') || '/html/account.html';
                window.location.href = redirect;
            } catch (err) {
                errorMsg.textContent = err.message || 'Invalid email or password.';
                errorMsg.style.display = 'block';
                btn.textContent = 'SIGN IN';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
